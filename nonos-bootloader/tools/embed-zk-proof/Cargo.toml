[package]
name = "embed-zk-proof"
version = "0.1.0"
edition = "2021"
publish = false
authors = ["eK <team@nonos.systems>"]
description = "Generate and embed Groth16 ZK attestation proofs into signed NONOS kernel binaries"
license = "AGPL-3.0"

[workspace]

[dependencies]
anyhow = "1.0"
clap = { version = "4.0", features = ["derive"] }
blake3 = "1.5"
hex = "0.4"
ark-bls12-381 = "0.5"
ark-groth16 = "0.5"
ark-ff = "0.5"
ark-relations = "0.5"
ark-r1cs-std = "0.5"
ark-serialize = "0.5"
ark-snark = "0.5"
ark-std = "0.5"
rand = "0.8"
nonos-attestation-circuit = { path = "../nonos-attestation-circuit" }
