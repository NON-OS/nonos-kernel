version = 3
abi = "nonos-sys-v1"

[wire]
gateway = "syscall"
reg_abi = "rax,rdi,rsi,rdx,r10,r8,r9"
ret_reg = "rax"
endian  = "little"
align   = 8
errno_negative = true

[errno_range]
min = -4095
max = -1

[errors]
EPERM        = -1
ENOENT       = -2
ESRCH        = -3
EINTR        = -4
EIO          = -5
ENXIO        = -6
E2BIG        = -7
ENOEXEC      = -8
EBADF        = -9
ECHILD       = -10
EAGAIN       = -11
ENOMEM       = -12
EACCES       = -13
EFAULT       = -14
EBUSY        = -16
EEXIST       = -17
ENODEV       = -19
ENOTDIR      = -20
EISDIR       = -21
EINVAL       = -22
ETXTBSY      = -26
ERANGE       = -34
ENOSYS       = -38
ENOTEMPTY    = -39

[limits]
max_ipc_msg     = 65536
max_mmap_bytes  = 268435456
max_caps        = 1024
max_devices     = 256

[numbers]
CRND = 0x444E5243
CHSH = 0x48534843
