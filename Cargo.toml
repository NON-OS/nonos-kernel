# NØNOS kernel — upper-half microkernel.
# eK@nonos.systems
#
# Static ET_EXEC kernel handed off by the UEFI bootloader. The kernel
# is mapped at PML4[511] (`0xffff_ffff_8000_0000`); the 256 GiB
# directmap lives at PML4[256] (`0xffff_8000_0000_0000`); PML4[0] is
# cleared post-handoff and must stay cleared. Capsules run at CPL=3
# in their own ASID; the kernel reaches user pages through the
# directmap, never by switching CR3 to the user table.
#
# `cargo build` resolves to `default = ["microkernel-core"]` — the
# brutal-minimum boot/runtime profile, what plain `cargo check`
# compiles on a clean tree.
#
# Profile cheat sheet:
#   microkernel-core              boot, sched, IPC, ELF, capability
#                                 boundary, SYSCALL/SYSRET trap path,
#                                 manifest verifier
#   microkernel-capsules          + proof_io + ramfs + keyring capsules
#   microkernel-keyring-smoketest + boot-time keyring round trip
#   microkernel                   alias for the runtime baseline
#                                 (currently `microkernel-capsules`)
#
# Every feature here is referenced by source (via `cfg(feature = ...)`)
# or composes a profile. Decorative flags do not belong in this file.
# A smoketest profile name does not imply the corresponding boot has
# passed; only the serial markers in `tests/boot/*.sh` do.

[package]
name        = "nonos_kernel"
version     = "0.8.4"
edition     = "2021"
publish     = false
license     = "AGPL-3.0"
authors     = ["eK@nonos.systems", "senseix21 <mahdix2118@protonmail.com>"]
description = "NØNOS upper-half microkernel — RAM-resident, capability-enforced, signed CPL=3 capsules"
repository  = "https://github.com/NON-OS/nonos-micro-kernel"
build       = "build.rs"
keywords    = ["kernel", "microkernel", "os", "security", "privacy"]
categories  = ["os", "no-std", "embedded"]
resolver    = "2"

[lib]
name       = "nonos_kernel"
path       = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[[bin]]
name    = "nonos-kernel"
path    = "src/nonos_main.rs"
harness = false

[features]
default = ["microkernel-core"]

# Bootstrap. `kernel` switches malloc/free to Rust `alloc`; `standalone`
# brings in the panic handler and global allocator.
kernel     = []
standalone = ["kernel"]

# Target architecture label.
arch-x86_64 = []

# Runtime subsystem.
sched = []

# Userland capsule embeds. Each `nonos-capsule-*` feature embeds the
# named capsule binary and arms the kernel-side spawner. Every name
# below maps 1:1 to a capsule directory under `userland/`.
nonos-capsule-proof-io          = []
nonos-capsule-ramfs             = []
nonos-capsule-wallpaper         = []
nonos-capsule-compositor        = []
nonos-capsule-desktop-shell     = []
nonos-capsule-wm                = []
nonos-capsule-toolkit           = []
nonos-capsule-about             = []
nonos-capsule-keyring           = []
nonos-capsule-entropy           = []
nonos-capsule-crypto            = []
nonos-capsule-vfs               = []
nonos-capsule-driver-virtio-rng = []
nonos-capsule-driver-virtio-blk = []
nonos-capsule-driver-virtio-gpu = []
nonos-capsule-driver-virtio-net = []
nonos-capsule-driver-ps2-input  = []
nonos-capsule-driver-xhci       = []
nonos-capsule-driver-usb-hid    = []
nonos-capsule-driver-usb-msc    = []
nonos-capsule-driver-e1000      = []
nonos-capsule-driver-i2c-pci    = []
nonos-capsule-driver-i2c-hid    = []
nonos-capsule-driver-iwlwifi    = []
nonos-capsule-driver-rtl8139    = []
nonos-capsule-driver-rtl8169    = []
nonos-capsule-driver-ahci       = []
nonos-capsule-driver-hda        = []
nonos-capsule-driver-nvme       = []
nonos-capsule-net-l2            = []
nonos-capsule-net-ip            = []
nonos-capsule-net-udp           = []
nonos-capsule-net-dhcp          = []
nonos-capsule-market            = []

# Compile the in-kernel selftest runner that drives every
# `boot::tests::*::all_pass()` group. Off by default; enabling it
# wires `boot::tests::selftest::run_all` into the kernel image and
# adds a single call site on the active boot path that prints
# PASS/FAIL on the serial. No production boot behaviour changes
# unless this feature is on.
nonos-selftest = []

# Production posture. Excludes the legacy unverified spawn path:
# `runner::legacy`, the `CapsuleSpec` legacy struct, and every
# capsule still wired through them are cfg-gated off. Only capsules
# that go through `spawn_verified` (proof_io today) compile under
# this feature. Mutex with `nonos-dev-unverified-capsules` is
# enforced by the `compile_error!` in `lib.rs`.
nonos-production = []

# Escape hatch for development that still needs the legacy
# unverified spawn path. Mutually exclusive with `nonos-production`
# (see the `compile_error!` in `lib.rs`). Never part of any default
# or smoketest profile; opt-in only.
nonos-dev-unverified-capsules = []

# Pre-iretq audit. The scheduler walks the target CR3 through the
# directmap and proves the kernel halves, the user RIP leaf, the
# user RSP leaf, TSS.RSP0 and the PF/GP IST stacks before iretq. On
# any failure the kernel prints `[USER-PROOF] FAIL ...` and halts
# instead of triple-faulting blindly. Every smoketest profile turns
# this on; production builds keep it off so the audit cost stays
# bounded to the lanes that watch serial.
nonos-user-entry-proof = []

# Boot smoketests. Each one drives a real round trip on the boot
# serial and emits PASS/FAIL markers consumed by the matching
# `tests/boot/*.sh` harness.
nonos-ramfs-smoketest             = ["nonos-capsule-ramfs", "nonos-user-entry-proof"]
nonos-keyring-smoketest           = ["nonos-capsule-keyring", "nonos-user-entry-proof"]
nonos-entropy-smoketest           = ["nonos-capsule-entropy", "nonos-user-entry-proof"]
nonos-crypto-hash-smoketest       = ["nonos-capsule-crypto", "nonos-user-entry-proof"]
nonos-vfs-smoketest               = ["nonos-capsule-vfs", "nonos-user-entry-proof"]
nonos-driver-virtio-rng-smoketest = ["nonos-capsule-driver-virtio-rng", "nonos-user-entry-proof"]
nonos-driver-virtio-blk-smoketest = ["nonos-capsule-driver-virtio-blk", "nonos-user-entry-proof"]
nonos-driver-virtio-net-smoketest = ["nonos-capsule-driver-virtio-net", "nonos-user-entry-proof"]
nonos-driver-ps2-input-smoketest  = ["nonos-capsule-driver-ps2-input", "nonos-user-entry-proof"]
nonos-driver-xhci-smoketest       = ["nonos-capsule-driver-xhci", "nonos-user-entry-proof"]
nonos-driver-e1000-smoketest      = ["nonos-capsule-driver-e1000", "nonos-user-entry-proof"]
nonos-market-smoketest            = ["nonos-capsule-market", "nonos-user-entry-proof"]
nonos-wallpaper-smoketest         = ["nonos-capsule-wallpaper", "nonos-user-entry-proof"]

# Brutal-minimum kernel profile. Each entry closes a real boundary:
#   kernel, standalone   no-std bootstrap and panic handler routing
#   arch-x86_64          target arch
#   sched                src/entry/kernel_main.rs enters the scheduler
#   sha3                 KASLR entropy path imports `sha3` unconditionally
#   crypto-ed25519-int   in-tree manifest verifier (Ed25519)
microkernel-core = [
  "kernel",
  "standalone",
  "arch-x86_64",
  "sched",
  "sha3",
  "crypto-ed25519-int",
]

# Runtime baseline: core + the three live capsule embeds.
microkernel-capsules = [
  "microkernel-core",
  "nonos-capsule-proof-io",
  "nonos-capsule-ramfs",
  "nonos-capsule-keyring",
]

# Per-capsule production profiles. Each builds a kernel under the
# `nonos-production` posture (verified-only spawn path, dev-unverified
# locked out) with proof_io baked in plus the named capsule. These
# are the kernel build path for everything that is not the smoketest
# harness; the matching `nonos-mk-<slug>-prod` Makefile recipes
# invoke them.
microkernel-proof-io = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
]

microkernel-ramfs = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-ramfs",
]

microkernel-keyring = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-keyring",
]

microkernel-entropy = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-entropy",
]

microkernel-crypto = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-crypto",
]

microkernel-vfs = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-vfs",
]

microkernel-market = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-market",
]

microkernel-driver-virtio-rng = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-rng",
]

microkernel-driver-virtio-blk = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-blk",
]

microkernel-driver-virtio-gpu = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-gpu",
]

microkernel-driver-virtio-net = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-net",
]

microkernel-driver-iwlwifi = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-iwlwifi",
]

microkernel-driver-i2c-pci = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-i2c-pci",
]

microkernel-driver-i2c-hid = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-i2c-pci",
  "nonos-capsule-driver-i2c-hid",
]

microkernel-driver-ps2-input = [
  "microkernel-core",
  "nonos-production",
