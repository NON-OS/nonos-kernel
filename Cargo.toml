  "nonos-capsule-driver-ps2-input",
]

microkernel-driver-xhci = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-xhci",
]

microkernel-driver-usb-hid = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-xhci",
  "nonos-capsule-driver-usb-hid",
