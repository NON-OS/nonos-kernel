# Runtime baseline alias. Resolves to `microkernel-capsules`, never to
# a smoketest profile.
microkernel = ["microkernel-capsules"]

# Mid-refactor cfg gates referenced from src.
nonos-arch-hardening = []   # src/arch/x86_64/security/{kpti,stack,spectre}
nonos-arch-iommu     = []   # src/arch/x86_64/iommu/*
nonos-fs-locking     = []   # src/fs/locking/*

# In-tree crypto, audit-anchored constant-time implementations.
crypto-ed25519-int   = []
crypto-ed25519-dalek = ["ed25519-dalek"]
crypto-curve25519    = ["curve25519-dalek", "x25519-dalek"]

# Post-quantum: NIST FIPS 203 (ML-KEM) and FIPS 204 (ML-DSA). Pulled in
# by the matching cfg-gated source modules; no boot profile turns them
# on yet.
mlkem512  = []
mlkem768  = []
mlkem1024 = []
mldsa2    = []
mldsa3    = []
mldsa5    = []

# Zero-knowledge proof systems. Source paths: src/crypto/zk/groth16/*,
# src/crypto/zk/halo2/*.
zk-groth16 = ["ark-bn254", "ark-groth16", "ark-serialize", "ark-ff", "ark-ec", "ark-std"]
zk-halo2   = ["halo2_proofs", "halo2curves"]

# Legacy hash, retained for Git object hashes / TOTP only.
sha1-legacy = []

# Host-side build. Used by tests that compile against std on the host.
std = []

[dependencies]
# Synchronization. spin is the kernel-wide lock primitive (no_std,
# interrupt-safe).
spin        = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex", "lazy", "rwlock"] }
lazy_static = { version = "1.4", features = ["spin_no_std"] }

# Allocator.
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

# Collections.
smallvec = { version = "1.15", default-features = false }
bitvec   = { version = "1.0",  default-features = false, features = ["alloc"] }
heapless = { version = "0.8",  default-features = false }

# External crypto (optional; in-tree implementations are the default).
ed25519-dalek    = { version = "2.1.1", default-features = false, features = ["alloc", "zeroize"], optional = true }
curve25519-dalek = { version = "4.1.3", default-features = false, features = ["alloc", "zeroize"], optional = true }
x25519-dalek     = { version = "2",     default-features = false, features = ["static_secrets"], optional = true }
sha3             = { version = "0.10",  default-features = false, optional = true }

# Hashing.
blake3 = { version = "1.0",  default-features = false }
sha2   = { version = "0.10", default-features = false, features = ["force-soft"] }

# Core utilities used in the kernel tree.
bitflags = { version = "2.4", default-features = false }
volatile = { version = "0.4", default-features = false }

# Network stack used by the virtio-net interface bridge.
smoltcp = { version = "0.11", default-features = false, features = ["alloc", "socket-raw", "socket-udp", "socket-tcp", "proto-ipv4", "proto-ipv6", "medium-ethernet"] }

# Zero-knowledge — arkworks (Groth16).
ark-bn254     = { version = "0.4", default-features = false, features = ["curve"], optional = true }
ark-groth16   = { version = "0.4", default-features = false, optional = true }
ark-serialize = { version = "0.4", default-features = false, features = ["derive"], optional = true }
ark-ff        = { version = "0.4", default-features = false, optional = true }
ark-ec        = { version = "0.4", default-features = false, optional = true }
ark-std       = { version = "0.4", default-features = false, optional = true }

# Zero-knowledge — halo2.
halo2_proofs = { version = "0.3", default-features = false, optional = true }
halo2curves  = { version = "0.6", default-features = false, optional = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
x86_64 = { version = "0.14", default-features = false, features = ["abi_x86_interrupt", "instructions"] }

[target.'cfg(not(target_arch = "x86_64"))'.dependencies]
blake3 = { version = "1.0", default-features = false, features = ["pure"] }

[build-dependencies]
blake3        = { version = "1.5",  default-features = false }
cc            = "1.1"
glob          = "0.3"
ed25519-dalek = { version = "2.1.1", default-features = false, features = ["alloc", "zeroize"] }
sha2          = { version = "0.10", default-features = false }

[dev-dependencies]
hex-literal = "0.4"
hex         = "0.4"

[lints.rust]
unused_imports         = "warn"
unused_variables       = "warn"
unused_mut             = "warn"
dead_code              = "warn"
unreachable_pub        = "warn"
unsafe_op_in_unsafe_fn = "warn"
unexpected_cfgs        = "deny"

[lints.clippy]
all         = "warn"
correctness = "deny"
suspicious  = "warn"
complexity  = "warn"
perf        = "warn"

# Machine-readable kernel ABI metadata. Edits here must reflect what
# the kernel actually does: numbers come from
# src/syscall/microkernel/numbers.rs, capability names from
# src/capabilities/types.rs.
[package.metadata.nonos]
zerostate = true
version   = "0.8.4"
abi       = "Mk-v0"

[package.metadata.nonos.vm]
directmap_base   = "0xffff_8000_0000_0000"   # PML4[256], 256 GiB phys map
kernel_text_base = "0xffff_ffff_8000_0000"   # PML4[511], static ET_EXEC
pml4_low_cleared = true                       # PML4[0] is zeroed post-handoff
heap_min         = "2MiB"
heap_max         = "1GiB"
stack_size       = "64KiB"
max_threads      = 1024

[package.metadata.nonos.security]
wx_enforced    = true
nx_stack       = true
smep           = true
smap           = true
kaslr          = true
cet            = true
stack_canaries = true
heap_guards    = true

# Capability names match `enum Capability` in src/capabilities/types.rs.
# `Debug` gates the MkDebug syscall.
[package.metadata.nonos.caps]
available = [
  "CoreExec", "IO", "Network", "IPC", "Memory",
  "Crypto", "FileSystem", "Hardware", "Debug", "Admin",
]

# Numeric Mk* surface available at CPL=3. Values mirror
# src/syscall/microkernel/numbers.rs. The gateway is the x86_64
# `syscall` instruction (LSTAR/STAR/SFMASK). There is no int-vector
# gateway and no POSIX fd channel.
[package.metadata.nonos.syscall]
gateway = "x86_64-syscall"
numbers = [
  0x1000, 0x1001, 0x1002,
  0x1010, 0x1011,
  0x1020, 0x1021, 0x1022,
  0x1030, 0x1031, 0x1032,
  0x1040, 0x1041, 0x1042,
  0x1043, 0x1044,
  0x1045, 0x1046, 0x1047, 0x1048,
  0x1049, 0x104A,
  0x104B, 0x104C, 0x104D, 0x104E,
  0x1050,
]
names = [
  "MkIpcSend", "MkIpcRecv", "MkIpcCall",
  "MkMmap", "MkMunmap",
  "MkSpawn", "MkExit", "MkYield",
  "MkCapGrant", "MkCapRevoke", "MkCapCheck",
  "MkDeviceList", "MkDeviceClaim", "MkDeviceRelease",
  "MkMmioMap", "MkMmioUnmap",
  "MkIrqBind", "MkIrqUnbind", "MkIrqAck", "MkIrqPoll",
  "MkDmaMap", "MkDmaUnmap",
  "MkPioGrant", "MkPioRead", "MkPioWrite", "MkPioRelease",
  "MkDebug",
]

[package.metadata.nonos.capsule]
format    = "ELF64"
signature = "ed25519"
hash      = "sha3-256"
max_size  = "16MiB"

# Release: lto="thin" + codegen-units=4 trades a small final-binary
# win for faster link during dev. End-of-cycle release builds switch
# to lto="fat" + codegen-units=1.
[profile.release]
opt-level       = 3
lto             = "thin"
codegen-units   = 4
panic           = "abort"
strip           = "debuginfo"
debug           = false
overflow-checks = false

# Dev: opt-level=1 because 0 is intolerable at runtime; deps stay at 2
# so they do not dominate the trace.
[profile.dev]
opt-level       = 1
panic           = "abort"
debug           = true
overflow-checks = true

[profile.dev.package."*"]
opt-level = 2

[profile.bench]
opt-level = 3
lto       = "thin"
debug     = true
