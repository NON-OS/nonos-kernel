microkernel-net-l2 = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-net",
  "nonos-capsule-net-l2",
]

microkernel-net-ip = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-net",
  "nonos-capsule-net-l2",
  "nonos-capsule-net-ip",
]

microkernel-net-udp = [
  "microkernel-core",
  "nonos-production",
  "nonos-capsule-proof-io",
  "nonos-capsule-driver-virtio-net",
  "nonos-capsule-net-l2",
  "nonos-capsule-net-ip",
  "nonos-capsule-net-udp",
