# NONOS userland: capsule_net_nym
# eK@nonos.systems
#
# NYM/mixnet privacy transport capsule. Owns mix-session state,
# fixed-size cell framing, cover traffic, and TCP gateway transport.

[package]
name = "nonos_capsule_net_nym"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS userland NYM mixnet capsule"

[[bin]]
name = "net_nym"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true
