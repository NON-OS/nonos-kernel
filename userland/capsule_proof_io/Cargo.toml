# NØNOS userland: capsule_proof_io
# eK@nonos.systems
#
# First proof capsule. Real user binary against the NØNOS userspace
# libc. _start emits one MkDebug marker on the boot serial, then
# MkExit. The point is to drive the SYSCALL-instruction →
# contract::dispatch → microkernel handler round trip with a real
# CPL=3 caller and watch the round trip complete. There is no `write`
# call here and no fd=1; the channel is the NØNOS-native MkDebug.

[package]
name = "nonos_capsule_proof_io"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NØNOS proof_io capsule — first CPL=3 user binary, drives MkDebug + MkExit round trip"

[[bin]]
name = "proof_io"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true

[profile.dev]
panic = "abort"
opt-level = 0
debug = true
