# NONOS userland: capsule_net_l2
# eK@nonos.systems
#
# Userland L2 networking capsule. Sits on top of a NIC capsule
# (capsule_driver_virtio_net0 / e1000_0 / rtl8139_0 / rtl8169_0)
# and handles ethernet framing + ARP. Exposes the `net.l2`
# service endpoint so upstream capsules (capsule_net_ip) can
# resolve neighbours, send frames, and subscribe to RX.

[package]
name = "nonos_capsule_net_l2"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS userland L2 networking capsule (ethernet + ARP)"

[[bin]]
name = "net_l2"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true
