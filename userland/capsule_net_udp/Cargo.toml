# NONOS userland: capsule_net_udp
# eK@nonos.systems
#
# UDP transport capsule. Talks to `capsule_net_ip` for L3, exposes
# the `net.udp` endpoint to caller capsules and to the
# socket multiplexer. Stateless: every datagram is independent.
# No fragmentation handling here — IP rejects fragments upstream.

[package]
name = "nonos_capsule_net_udp"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS userland UDP transport capsule"

[[bin]]
name = "net_udp"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true
