# NONOS userland: compositor
# eK@nonos.systems
#
# Phase 4 compositor skeleton. Owns scene/damage/cursor IPC opcodes
# in userland and runs as a capsule process behind the kernel spawn
# glue (`src/userspace/capsule_compositor`).

[package]
name = "nonos_compositor"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS compositor capsule skeleton"

[[bin]]
name = "compositor"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true

[profile.dev]
panic = "abort"
opt-level = 0
debug = true
