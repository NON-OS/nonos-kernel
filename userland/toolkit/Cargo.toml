# NONOS userland: toolkit

[package]
name = "nonos_toolkit"
version = "0.1.0"
edition = "2021"
authors = ["NONOS Contributors"]
license = "AGPL-3.0"
description = "NONOS toolkit library and migration runtime"

[lib]
name = "nonos_toolkit"
path = "src/lib.rs"

[[bin]]
name = "toolkit"
path = "src/main.rs"

[dependencies]

[target.'cfg(target_arch = "x86_64")'.dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
