# NØNOS userland libc
# eK@nonos.systems
#
# Userspace libc for NØNOS capsules. Exposes only the Mk syscall ABI:
# Mk{IpcSend,IpcRecv,IpcCall}, MkMmap, MkMunmap, MkExit, MkYield, the
# broker family (device/mmio/irq/dma/pio), and MkDebug. There is no fd
# channel and no `read`/`write` helper. Built outside the kernel
# crate. The SYSCALL-instruction trampoline in this crate is the only
# path between CPL=3 capsules and the kernel syscall contract.

[package]
name = "nonos_userland_libc"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NØNOS userspace libc — Mk syscall ABI for CPL=3 capsules"

[lib]
name = "nonos_libc"
# `staticlib` produces the .a for C-ABI consumers (the real userspace
# distribution shape). `rlib` lets Rust user programs in the workspace
# depend on this crate directly via Cargo, which is how the in-tree
# proof binaries link.
crate-type = ["staticlib", "rlib"]

[dependencies]
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true

[profile.dev]
panic = "abort"
opt-level = 0
debug = true
