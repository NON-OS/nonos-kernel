# NONOS userland: capsule_text_editor
# eK@nonos.systems
#
# Fixed-capacity edit buffer with column wrap. Owned state, no
# globals. Keyboard input (printable, Backspace, Enter, Esc). Real
# production capsule built on `nonos_app_skeleton`.

[package]
name = "nonos_text_editor"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS text editor capsule"

[[bin]]
name = "text_editor"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
nonos_app_skeleton = { path = "../app_skeleton" }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true

[profile.dev]
panic = "abort"
opt-level = 0
debug = true
