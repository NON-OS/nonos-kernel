# NONOS userland: capsule_wallpaper
# eK@nonos.systems
#
# Phase 3 wallpaper service capsule. Runs as a long-lived IPC service,
# maintains wallpaper state, decodes payloads through toolkit image
# decoders, and submits full-screen updates through compositor surface
# contracts.

[package]
name = "nonos_capsule_wallpaper"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
authors = ["eK@nonos.systems"]
description = "NONOS wallpaper capsule — compositor-integrated wallpaper service"

[[bin]]
name = "wallpaper"
path = "src/main.rs"

[dependencies]
nonos_libc = { package = "nonos_userland_libc", path = "../libc" }
nonos_toolkit = { path = "../toolkit" }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
strip = true

[profile.dev]
panic = "abort"
opt-level = 0
debug = true
