# cargo-deny policy for the NONOS kernel crate. Consumed by
# `.github/workflows/security-audit.yml::dependency-policy`.
#
# References:
#   https://embarkstudios.github.io/cargo-deny/checks/index.html

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Each entry: advisory ID, the dependency path it lands at, why this
# baseline tolerates it, and the upstream condition that lets us drop
# the entry. Vulnerabilities (severity-bearing) stay blocking; the
# entries below are unmaintained / unsound categorisations on
# build-time or off-trusted-path transitives.
ignore = [
    { id = "RUSTSEC-2025-0056", reason = "adler 1.0.2 — unmaintained. Path: nonos_kernel -> miniz_oxide -> adler. miniz_oxide is the gzip codec used for kernel image compression in build artefacts; not on the microkernel runtime path. Drop when miniz_oxide releases against adler2." },
    { id = "RUSTSEC-2024-0388", reason = "derivative 2.2.0 — unmaintained. Path: nonos_kernel -> ark-poly -> derivative (and the rest of the arkworks tree). Build-time only; the microkernel does not invoke arkworks at runtime. Drop when arkworks ships without derivative." },
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 — unmaintained. Path: nonos_kernel -> halo2curves -> paste, and nonos_kernel -> ark-ff -> paste. Build-time macro only. Drop when halo2/arkworks drop paste." },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8.5 — unsound only when rand::rng() is called with a custom logger. Path: nonos_kernel -> halo2curves -> pasta_curves -> rand. The kernel never installs a custom logger and the transitive use goes through the deterministic seed APIs. Drop when halo2curves migrates to rand 0.9." },
]

[licenses]
# Anything not in this list trips the licenses check. AGPL-3.0 is the
# project's own; the rest are FOSS-compatible commodities accepted by
# the audit team.
allow = [
    "0BSD",                          # smoltcp 0.11.0, managed 0.8.0 (BSD Zero Clause; OSI-approved, public-domain-equivalent)
    "AGPL-3.0",                      # this crate
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = [
    # OpenSSL is not used directly. Catch accidental introduction.
    { name = "openssl-sys" },
    { name = "openssl" },
    # Reject the unmaintained legacy time crate; chrono is preferred when
    # date math is needed.
    { name = "time", version = "<0.3" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
