# Legacy reference. Not consumed by the active build.
#
# This file captures the kitchen-sink `default = [...]` and the
# `nonos = [...]` RAM-only profile that were active in `Cargo.toml`
# before the microkernel-only baseline. They are kept here as a
# historical record of what the monolithic surface looked like, so
# future engineers can trace where a flag came from when migrating a
# subsystem into the microkernel path. The active build does not read
# this file.
#
# Reading order:
#   - The `default` block enabled every feature on the kernel side. It
#     was removed because most entries had no `cfg(feature = "...")`
#     consumer in `src/`; the ones that did (sched, sha3, ed25519-int,
#     curve25519, brotli, secureboot, sha1-legacy, mlkem*/mldsa*) live
#     directly in the microkernel-* profiles or are gated out of the
#     trusted path entirely.
#   - The `nonos` block was the production RAM-only profile. It mirrored
#     `default` minus disk filesystems, disk block drivers, swap, and
#     hibernate. It was retired because it duplicated the kitchen-sink
#     surface; the active production profile is `microkernel`, which is
#     RAM-only by construction.
#
# Migration note: when a subsystem is brought back as a real capsule
# under `userland/<name>/`, the relevant Cargo features land in the
# active `Cargo.toml` next to the existing `nonos-capsule-*` entries,
# not as a wholesale restoration of these blocks.

[features-default-monolithic]
default = [
  "kernel", "standalone",
  "nonos-syscall-int80",
  "nonos-log-serial", "nonos-log-vga", "nonos-log-kmsg", "nonos-log-fb", "nonos-log-early",
  "nonos-heap-guard", "nonos-wx-audit", "nonos-page-zero", "nonos-kaslr", "nonos-pcid",
  "nonos-nx-stack", "nonos-smap-smep", "nonos-cet", "nonos-fallback-entry",
  "nonos-stack-protector", "nonos-fortify",
  "nonos-secureboot", "nonos-tpm", "nonos-dma-guard", "nonos-pti",
