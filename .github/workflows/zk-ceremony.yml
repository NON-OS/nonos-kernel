name: "ZK Ceremony Production"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Ceremony action"
        required: true
        type: choice
        options:
          - init
          - contribute
          - finalize
          - verify
      circuit:
        description: "Circuit name"
        required: false
        default: "boot-authority"
        type: choice
        options:
          - boot-authority
          - update-authority
          - recovery-key
      contributor_name:
        description: "Contributor name (Org:Name format)"
        required: false
        default: ""
        type: string
      ceremony_id:
        description: "Ceremony ID (for contribute/finalize)"
        required: false
        default: ""
        type: string

concurrency:
  group: zk-ceremony-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ceremony-init:
    name: "Initialize Ceremony"
    if: github.event.inputs.action == 'init'
    runs-on: ubuntu-latest
    outputs:
      ceremony_id: ${{ steps.init.outputs.ceremony_id }}
      params_hash: ${{ steps.init.outputs.params_hash }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install Rust"
        uses: dtolnay/rust-action@stable

      - name: "Build Ceremony Tool"
        run: |
          cd nonos-bootloader/tools/nonos-attestation-circuit
          cargo build --release --bin run_ceremony

      - name: "Initialize Ceremony"
        id: init
        run: |
          CEREMONY_ID="nonos-${{ github.event.inputs.circuit }}-$(date +%Y%m%d%H%M%S)"
          mkdir -p ceremony_artifacts

          ./nonos-bootloader/tools/nonos-attestation-circuit/target/release/run_ceremony \
            init \
            --output ceremony_artifacts/params_round_0.bin \
            --circuit ${{ github.event.inputs.circuit }} \
            --id "${CEREMONY_ID}"

          echo "ceremony_id=${CEREMONY_ID}" >> $GITHUB_OUTPUT

          HASH=$(sha256sum ceremony_artifacts/params_round_0.bin | cut -c1-16)
          echo "params_hash=${HASH}" >> $GITHUB_OUTPUT

      - name: "Upload Initial Parameters"
        uses: actions/upload-artifact@v4
        with:
          name: ceremony-init-${{ steps.init.outputs.ceremony_id }}
          path: ceremony_artifacts/
          retention-days: 90

      - name: "Post Summary"
        run: |
          echo "## ZK Ceremony Initialized" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ceremony ID | \`${{ steps.init.outputs.ceremony_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Circuit | ${{ github.event.inputs.circuit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Params Hash | \`${{ steps.init.outputs.params_hash }}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`params_round_0.bin\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Distribute to at least 5 participants" >> $GITHUB_STEP_SUMMARY
          echo "3. Each participant runs \`contribute\` action" >> $GITHUB_STEP_SUMMARY

  ceremony-contribute:
    name: "Add Contribution"
    if: github.event.inputs.action == 'contribute'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Validate Inputs"
        run: |
          if [[ -z "${{ github.event.inputs.contributor_name }}" ]]; then
            echo "ERROR: Contributor name required"
            exit 1
          fi
          if [[ -z "${{ github.event.inputs.ceremony_id }}" ]]; then
            echo "ERROR: Ceremony ID required"
            exit 1
          fi

      - name: "Install Rust"
        uses: dtolnay/rust-action@stable

      - name: "Build Ceremony Tool"
        run: |
          cd nonos-bootloader/tools/nonos-attestation-circuit
          cargo build --release --bin run_ceremony

      - name: "Download Previous Parameters"
        uses: actions/download-artifact@v4
        with:
          pattern: ceremony-*-${{ github.event.inputs.ceremony_id }}
          path: ceremony_input/
          merge-multiple: true

      - name: "Find Latest Parameters"
        id: find
        run: |
          LATEST=$(ls -t ceremony_input/params_round_*.bin 2>/dev/null | head -1)
          if [[ -z "${LATEST}" ]]; then
            echo "ERROR: No parameters found for ceremony ${{ github.event.inputs.ceremony_id }}"
            exit 1
          fi
          ROUND=$(echo "${LATEST}" | grep -oE 'round_[0-9]+' | grep -oE '[0-9]+')
          echo "latest_params=${LATEST}" >> $GITHUB_OUTPUT
          echo "current_round=${ROUND}" >> $GITHUB_OUTPUT
          echo "next_round=$((ROUND + 1))" >> $GITHUB_OUTPUT

      - name: "Generate Contribution"
        id: contribute
        run: |
          mkdir -p ceremony_output
          NEXT_ROUND=${{ steps.find.outputs.next_round }}

          ./nonos-bootloader/tools/nonos-attestation-circuit/target/release/run_ceremony \
            contribute \
            --input "${{ steps.find.outputs.latest_params }}" \
            --output "ceremony_output/params_round_${NEXT_ROUND}.bin" \
            --name "${{ github.event.inputs.contributor_name }}" \
            --entropy system

          HASH=$(sha256sum "ceremony_output/params_round_${NEXT_ROUND}.bin" | cut -c1-16)
          echo "params_hash=${HASH}" >> $GITHUB_OUTPUT

      - name: "Upload New Parameters"
        uses: actions/upload-artifact@v4
        with:
          name: ceremony-round-${{ steps.find.outputs.next_round }}-${{ github.event.inputs.ceremony_id }}
          path: ceremony_output/
          retention-days: 90

      - name: "Post Summary"
        run: |
          echo "## Contribution Added" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contributor | ${{ github.event.inputs.contributor_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Round | ${{ steps.find.outputs.next_round }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Params Hash | \`${{ steps.contribute.outputs.params_hash }}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IMPORTANT:** You must now destroy your local entropy source!" >> $GITHUB_STEP_SUMMARY

  ceremony-finalize:
    name: "Finalize Ceremony"
    if: github.event.inputs.action == 'finalize'
    runs-on: ubuntu-latest
    outputs:
      vk_hash: ${{ steps.finalize.outputs.vk_hash }}
    steps:
      - uses: actions/checkout@v4

      - name: "Validate Inputs"
        run: |
          if [[ -z "${{ github.event.inputs.ceremony_id }}" ]]; then
            echo "ERROR: Ceremony ID required"
            exit 1
          fi

      - name: "Install Rust"
        uses: dtolnay/rust-action@stable

      - name: "Build Ceremony Tool"
        run: |
          cd nonos-bootloader/tools/nonos-attestation-circuit
          cargo build --release --bin run_ceremony

      - name: "Download All Parameters"
        uses: actions/download-artifact@v4
        with:
          pattern: ceremony-*-${{ github.event.inputs.ceremony_id }}
          path: ceremony_all/
          merge-multiple: true

      - name: "Find Final Parameters"
        id: find
        run: |
          FINAL=$(ls -t ceremony_all/params_round_*.bin 2>/dev/null | head -1)
          if [[ -z "${FINAL}" ]]; then
            echo "ERROR: No parameters found"
            exit 1
          fi
          ROUND=$(echo "${FINAL}" | grep -oE 'round_[0-9]+' | grep -oE '[0-9]+')
          echo "final_params=${FINAL}" >> $GITHUB_OUTPUT
          echo "final_round=${ROUND}" >> $GITHUB_OUTPUT

          if [[ "${ROUND}" -lt 5 ]]; then
            echo "ERROR: Need at least 5 rounds, got ${ROUND}"
            exit 1
          fi

      - name: "Finalize and Extract VK"
        id: finalize
        run: |
          mkdir -p final_vk

          ./nonos-bootloader/tools/nonos-attestation-circuit/target/release/run_ceremony \
            finalize \
            --input "${{ steps.find.outputs.final_params }}" \
            --output final_vk

          VK_HASH=$(sha256sum final_vk/vk_boot_authority.bin | cut -c1-16)
          echo "vk_hash=${VK_HASH}" >> $GITHUB_OUTPUT

      - name: "Upload Final VK"
        uses: actions/upload-artifact@v4
        with:
          name: ceremony-final-vk-${{ github.event.inputs.ceremony_id }}
          path: final_vk/
          retention-days: 365

      - name: "Post Summary"
        run: |
          echo "## Ceremony Finalized" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ceremony ID | \`${{ github.event.inputs.ceremony_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Final Round | ${{ steps.find.outputs.final_round }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VK Hash | \`${{ steps.finalize.outputs.vk_hash }}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`final_vk\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Place VK files in \`zk/ceremony/\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Build bootloader: \`NONOS_ZK_CEREMONY_DIR=zk/ceremony cargo build\`" >> $GITHUB_STEP_SUMMARY

  ceremony-verify:
    name: "Verify Ceremony"
    if: github.event.inputs.action == 'verify'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install Rust"
        uses: dtolnay/rust-action@stable

      - name: "Build Ceremony Tool"
        run: |
          cd nonos-bootloader/tools/nonos-attestation-circuit
          cargo build --release --bin run_ceremony

      - name: "Download Ceremony Artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: ceremony-*-${{ github.event.inputs.ceremony_id }}
          path: ceremony_verify/
          merge-multiple: true

      - name: "Verify Ceremony"
        run: |
          if [[ -f "ceremony_verify/ceremony_transcript.json" ]]; then
            ./nonos-bootloader/tools/nonos-attestation-circuit/target/release/run_ceremony \
              verify \
              --transcript ceremony_verify/ceremony_transcript.json
          else
            echo "ERROR: No transcript found"
            exit 1
          fi

      - name: "Post Summary"
        run: |
          echo "## Ceremony Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ceremony transcript verified successfully" >> $GITHUB_STEP_SUMMARY
