name: Kernel Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  kernel-tests:
    name: Run Kernel Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools qemu-system-x86 ovmf
          pip3 install pynacl

      - name: Setup signing key
        run: |
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          chmod 600 .keys/dev-signing.seed
          test -s .keys/dev-signing.seed || { echo "Signing key empty or invalid"; exit 1; }
          [ $(wc -c < .keys/dev-signing.seed) -eq 32 ] || { echo "Signing key must be 32 bytes"; exit 1; }

      - name: Build bootloader
        run: make bootloader
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Build kernel with tests
        run: make kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Sign kernel
        run: make sign-kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Generate ZK keys
        run: make generate-zk-keys
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Create test ISO
        run: make iso
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Run kernel tests in QEMU
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          TEST_FILE="test-results/kernel-test-${TIMESTAMP}-${{ github.sha }}.txt"

          echo "NONOS Kernel Test Results" > "$TEST_FILE"
          echo "=========================" >> "$TEST_FILE"
          echo "" >> "$TEST_FILE"
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$TEST_FILE"
          echo "Commit: ${{ github.sha }}" >> "$TEST_FILE"
          echo "Branch: ${{ github.ref_name }}" >> "$TEST_FILE"
          echo "Runner: ${{ runner.os }}" >> "$TEST_FILE"
          echo "" >> "$TEST_FILE"
          echo "========================================" >> "$TEST_FILE"
          echo "KERNEL TEST OUTPUT" >> "$TEST_FILE"
          echo "========================================" >> "$TEST_FILE"
          echo "" >> "$TEST_FILE"

          timeout 300 qemu-system-x86_64 \
            -machine q35 \
            -cpu qemu64 \
            -m 512M \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -cdrom target/nonos.iso \
            -serial stdio \
            -display none \
            -no-reboot \
            2>&1 | tee -a "$TEST_FILE" || true

          echo "" >> "$TEST_FILE"
          echo "========================================" >> "$TEST_FILE"
          echo "TEST RUN COMPLETE" >> "$TEST_FILE"
          echo "========================================" >> "$TEST_FILE"

          echo "TEST_FILE=$TEST_FILE" >> $GITHUB_ENV

      - name: Parse test results
        run: |
          if grep -q "ALL TESTS PASSED" "${{ env.TEST_FILE }}"; then
            echo "TEST_STATUS=PASSED" >> $GITHUB_ENV
            echo "All kernel tests passed!"
          elif grep -q "SOME TESTS FAILED" "${{ env.TEST_FILE }}"; then
            echo "TEST_STATUS=FAILED" >> $GITHUB_ENV
            echo "Some kernel tests failed!"
          else
            echo "TEST_STATUS=UNKNOWN" >> $GITHUB_ENV
            echo "Could not determine test status"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-results-${{ github.sha }}
          path: test-results/
          retention-days: 365

      - name: Commit test results
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add test-results/
          git commit -m "test: kernel test results for ${{ github.sha }}

          Status: ${{ env.TEST_STATUS }}
          Branch: ${{ github.ref_name }}
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" || echo "No changes to commit"
          git push || echo "Push failed - results saved as artifact"

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

      - name: Check test status
        if: env.TEST_STATUS == 'FAILED'
        run: |
          echo "Kernel tests failed!"
          exit 1
