name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.8.0-alpha)'
        required: true
        default: '0.8.0-alpha'
      create_tag:
        description: 'Create git tag'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools gdisk python3 python3-pip
          pip3 install pynacl

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup target add x86_64-unknown-uefi
          rustup component add rust-src llvm-tools-preview
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            nonos-bootloader/target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup signing key
        run: |
          if [ -z "${{ secrets.SIGNING_KEY_BASE64 }}" ]; then
            echo "ERROR: SIGNING_KEY secret not configured"
            echo "Go to repo Settings > Secrets > Actions and add SIGNING_KEY"
            echo "Generate with: head -c 32 /dev/urandom | base64"
            exit 1
          fi
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          if [ $(wc -c < .keys/dev-signing.seed) -lt 32 ]; then
            echo "ERROR: SIGNING_KEY must be at least 32 bytes"
            exit 1
          fi
          chmod 600 .keys/dev-signing.seed
          echo "Signing key configured"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate ZK attestation keys
        run: |
          echo "Building ZK tools and generating attestation keys..."
          make generate-zk-keys

      - name: Build release
        run: make ci-release VERSION=${{ steps.version.outputs.version }} SIGNING_KEY=${{ github.workspace }}/.keys/dev-signing.seed 
      
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp target/nonos.iso "dist/nonos-${VERSION}.iso"
          cp target/nonos.img "dist/nonos-${VERSION}.img"
          cp target/kernel_attested.bin "dist/nonos-kernel-${VERSION}.bin"
          cd dist && sha256sum * > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nonos-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90

      - name: Read release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="docs/releases/v${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Found release notes: $NOTES_FILE"
            BODY=$(cat "$NOTES_FILE")
          else
            echo "No release notes found at $NOTES_FILE, using default"
            BODY="## NØNOS $VERSION

            Release $VERSION of the NØNOS operating system.

            See the commit history for details on changes in this release."
          fi

          BODY="${BODY}

          ---

          ## Download and Verify

          Download the ISO or IMG file below and verify the checksum before use.

          To run in QEMU:
          \`\`\`
          qemu-system-x86_64 -m 2G -cpu host -enable-kvm -device virtio-rng-pci -cdrom nonos-${VERSION}.iso
          \`\`\`

          To write to USB:
          \`\`\`
          sudo dd if=nonos-${VERSION}.img of=/dev/sdX bs=4M status=progress
          \`\`\`

          ---

          **Experimental software. Use at your own risk.**"

          echo "body<<RELEASE_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "RELEASE_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NØNOS ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            dist/nonos-*.iso
            dist/nonos-*.img
            dist/nonos-kernel-*.bin
            dist/SHA256SUMS
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -rf .keys/
