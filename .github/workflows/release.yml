name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.8.0-alpha)'
        required: true
        default: '0.8.0-alpha'
      create_tag:
        description: 'Create git tag'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools gdisk python3 python3-pip
          pip3 install pynacl

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup target add x86_64-unknown-uefi
          rustup component add rust-src llvm-tools-preview
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            nonos-bootloader/target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup signing key
        run: |
          if [ -z "${{ secrets.SIGNING_KEY_BASE64 }}" ]; then
            echo "ERROR: SIGNING_KEY secret not configured"
            echo "Go to repo Settings > Secrets > Actions and add SIGNING_KEY"
            echo "Generate with: head -c 32 /dev/urandom | base64"
            exit 1
          fi
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          if [ $(wc -c < .keys/dev-signing.seed) -lt 32 ]; then
            echo "ERROR: SIGNING_KEY must be at least 32 bytes"
            exit 1
          fi
          chmod 600 .keys/dev-signing.seed
          echo "Signing key configured"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate ZK attestation keys
        run: |
          echo "Building ZK tools and generating attestation keys..."
          make generate-zk-keys

      - name: Build release
        run: make ci-release VERSION=${{ steps.version.outputs.version }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp target/nonos.iso "dist/nonos-${VERSION}.iso"
          cp target/nonos.img "dist/nonos-${VERSION}.img"
          cp target/kernel_attested.bin "dist/nonos-kernel-${VERSION}.bin"
          cd dist && sha256sum * > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nonos-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NØNOS ${{ steps.version.outputs.version }}
          body: |
            ## NØNOS Alpha ${{ steps.version.outputs.version }}

            **Status:** Experimental Alpha — Do not use for significant funds

            First release with functional Ethereum wallet running natively in the kernel.

            **Documentation:** [nonos.software](https://nonos.software)

            ### Native Ethereum Wallet

            - Key derivation from master seed using BLAKE3 with deterministic paths
            - Multiple account generation within a single wallet
            - Balance display for ETH and ERC-20 tokens (NOX supported)
            - QR code generation for receive addresses
            - Network switching between Ethereum mainnet and Sepolia testnet
            - Transaction signing with secp256k1 ECDSA
            - RPC communication with public Ethereum endpoints

            ### Network Stack

            - TLS 1.3 with X.509 certificate chain verification
            - RSA-SHA256/384/512 and ECDSA-P256-SHA256/384 signature support
            - Reduced RPC timeouts for faster feedback
            - IPv4 with TCP congestion control

            ### Security

            - Ed25519 kernel signature verification
            - Groth16 zero-knowledge boot attestation
            - Constant-time secp256k1 operations
            - Private keys exist only in kernel memory

            ### Known Limitations

            - UI blocks briefly during network requests
            - No persistent storage (wallet state lost on reboot)
            - No hardware wallet integration
            - No EIP-1559 transaction support
            - Only x86_64 architecture supported

            ### Artifacts

            | File | Description |
            |------|-------------|
            | `nonos-${{ steps.version.outputs.version }}.iso` | Bootable ISO image |
            | `nonos-${{ steps.version.outputs.version }}.img` | Raw disk image for USB |
            | `nonos-kernel-${{ steps.version.outputs.version }}.bin` | Signed kernel with ZK proof |
            | `SHA256SUMS` | Integrity checksums |

            ### Quick Start

            ```bash
            # Verify
            sha256sum -c SHA256SUMS

            # Run in QEMU
            qemu-system-x86_64 -m 2G -cpu host -enable-kvm \
              -device virtio-rng-pci \
              -cdrom nonos-${{ steps.version.outputs.version }}.iso

            # Install to USB
            sudo dd if=nonos-${{ steps.version.outputs.version }}.img of=/dev/sdX bs=4M status=progress
            ```

            ### Changes

            ${{ steps.changelog.outputs.commits }}

            ---
            **This is experimental software. Bugs expected. Use at your own risk.**
          files: |
            dist/nonos-*.iso
            dist/nonos-*.img
            dist/nonos-kernel-*.bin
            dist/SHA256SUMS
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -rf .keys/
