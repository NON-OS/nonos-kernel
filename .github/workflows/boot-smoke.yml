# Runtime smoke tests under QEMU + OVMF.
#
# Two lanes, both blocking:
#   - ramfs-round-trip   build the ramfs smoketest kernel, boot it, grade
#                        the [RAMFS-TEST] markers on serial.
#   - keyring-round-trip build the keyring smoketest kernel, boot it,
#                        grade the [KEYRING-TEST] markers on serial.
#
# Each lane uploads its own serial log as an artefact on failure.

name: boot-smoke

# Push and PR triggers are off while the QEMU sig-verify path is
# under triage. Manual runs stay available via the Actions tab;
# re-enable by restoring the push and pull_request stanzas once a
# real fix lands.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: boot-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  BOOT_TEST_TIMEOUT: '240'
  TOOLCHAIN: nightly-2026-01-16

jobs:
  ramfs-round-trip:
    name: ramfs capsule round trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview rustfmt
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install QEMU + OVMF + helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools \
            qemu-system-x86 ovmf binutils
          pip3 install --user pynacl

      - name: OVMF inventory (diagnostic)
        run: |
          echo "OVMF / edk2 firmware visible to the runner:"
          find /usr/share -name 'OVMF*.fd' -o -name 'edk2*.fd' 2>/dev/null | sort
          echo "Selection happens inside tests/boot/ramfs_round_trip.sh"

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Generate ZK ceremony keys
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-ensure-zk-keys

      - name: Expected serial markers
        run: |
          echo "Pass requires every marker below in the QEMU serial log:"
          echo "  [INIT] Starting"
          echo "  [RAMFS] capsule spawned"
          echo "  [RAMFS-TEST] open ok"
          echo "  [RAMFS-TEST] write ok"
          echo "  [RAMFS-TEST] read ok"
          echo "  [RAMFS-TEST] truncate ok"
          echo "  [RAMFS-TEST] close ok"
          echo "  [RAMFS-TEST] PASS"

      - name: make nonos-mk-boot-ramfs
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-boot-ramfs

      - name: Serial log tail
        if: always()
        run: |
          if [ -f target/boot-test-ramfs.log ]; then
            echo "----- last 200 lines of target/boot-test-ramfs.log -----"
            tail -n 200 target/boot-test-ramfs.log
          else
            echo "No serial log produced"
          fi

      - name: Upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-ramfs-serial-${{ github.sha }}
          path: target/boot-test-ramfs.log
          retention-days: 30

      - name: Cleanup signing material
        if: always()
        run: rm -rf .keys/

  keyring-round-trip:
    name: keyring capsule round trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview rustfmt
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install QEMU + OVMF + helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools \
            qemu-system-x86 ovmf binutils
          pip3 install --user pynacl

      - name: OVMF inventory (diagnostic)
        run: |
          echo "OVMF / edk2 firmware visible to the runner:"
          find /usr/share -name 'OVMF*.fd' -o -name 'edk2*.fd' 2>/dev/null | sort
          echo "Selection happens inside tests/boot/keyring_round_trip.sh"

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Generate ZK ceremony keys
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-ensure-zk-keys

      - name: Expected serial markers
        run: |
          echo "Pass requires every marker below in the QEMU serial log:"
          echo "  [INIT] Starting"
          echo "  [KEYRING] capsule spawned"
          echo "  [KEYRING-TEST] capsule alive"
          echo "  [KEYRING-TEST] store ok"
          echo "  [KEYRING-TEST] retrieve ok"
          echo "  [KEYRING-TEST] lock ok"
          echo "  [KEYRING-TEST] retrieve-locked denied"
          echo "  [KEYRING-TEST] unlock ok"
          echo "  [KEYRING-TEST] retrieve-unlocked ok"
          echo "  [KEYRING-TEST] metadata ok"
          echo "  [KEYRING-TEST] count ok"
          echo "  [KEYRING-TEST] delete ok"
          echo "  [KEYRING-TEST] retrieve-after-delete denied"
          echo "  [KEYRING-TEST] PASS"

      - name: make nonos-mk-boot-keyring
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-boot-keyring

      - name: Serial log tail
        if: always()
        run: |
          if [ -f target/boot-test-keyring.log ]; then
            echo "----- last 200 lines of target/boot-test-keyring.log -----"
            tail -n 200 target/boot-test-keyring.log
          else
            echo "No serial log produced"
          fi

      - name: Upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-keyring-serial-${{ github.sha }}
          path: target/boot-test-keyring.log
          retention-days: 30

      - name: Cleanup signing material
        if: always()
        run: rm -rf .keys/

  ps2-input-round-trip:
    name: ps2 input capsule round trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview rustfmt
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install QEMU + OVMF + helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools \
            qemu-system-x86 ovmf binutils netcat-openbsd
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Generate ZK ceremony keys
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-ensure-zk-keys

      - name: Expected serial markers
        run: |
          echo "Pass requires every marker below in the QEMU serial log:"
          echo "  [INIT] Starting"
          echo "  [driver_ps2] endpoint driver.ps2_kbd0 ready"
          echo "  [DRIVER-PS2-TEST] capsule alive"
          echo "  [DRIVER-PS2-TEST] healthcheck ok"
          echo "  [DRIVER-PS2-TEST] get_state ok"
          echo "  [DRIVER-PS2-TEST] poll_events ok"
          echo "  [DRIVER-PS2-TEST] counters advanced"
          echo "  [DRIVER-PS2-TEST] PASS"

      - name: make nonos-mk-boot-ps2-input
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-boot-ps2-input

      - name: Serial log tail
        if: always()
        run: |
          if [ -f target/boot-test-driver-ps2-input.log ]; then
            echo "----- last 200 lines of target/boot-test-driver-ps2-input.log -----"
            tail -n 200 target/boot-test-driver-ps2-input.log
          else
            echo "No serial log produced"
          fi

      - name: Upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-ps2-input-serial-${{ github.sha }}
          path: target/boot-test-driver-ps2-input.log
          retention-days: 30

      - name: Cleanup signing material
        if: always()
        run: rm -rf .keys/

  xhci-round-trip:
    name: xhci P0 controller bring-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview rustfmt
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install QEMU + OVMF + helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools \
            qemu-system-x86 ovmf binutils
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Generate ZK ceremony keys
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-ensure-zk-keys

      - name: Expected serial markers
        run: |
          echo "Pass requires every marker below in the QEMU serial log."
          echo "P0 scope: controller bring-up only. No USB enumeration."
          echo "  [INIT] Starting"
          echo "  [driver_xhci] discover ok"
          echo "  [driver_xhci] claim ok"
          echo "  [driver_xhci] mmio ok"
          echo "  [driver_xhci] irq ok"
          echo "  [driver_xhci] controller supported"
          echo "  [driver_xhci] halt ok"
          echo "  [driver_xhci] reset ok"
          echo "  [driver_xhci] cnr cleared"
          echo "  [driver_xhci] scratchpads ok"
          echo "  [driver_xhci] dcbaa ok"
          echo "  [driver_xhci] cmd ring ok"
          echo "  [driver_xhci] evt ring ok"
          echo "  [driver_xhci] running"
          echo "  [driver_xhci] noop ok"
          echo "  [driver_xhci] endpoint driver.xhci0 ready"
          echo "  [DRIVER-XHCI-TEST] capsule alive"
          echo "  [DRIVER-XHCI-TEST] healthcheck ok"
          echo "  [DRIVER-XHCI-TEST] controller_status ok"
          echo "  [DRIVER-XHCI-TEST] port_status ok"
          echo "  [DRIVER-XHCI-TEST] PASS"

      - name: make nonos-mk-boot-xhci
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-boot-xhci

      - name: Serial log tail
        if: always()
        run: |
          if [ -f target/boot-test-driver-xhci.log ]; then
            echo "----- last 200 lines of target/boot-test-driver-xhci.log -----"
            tail -n 200 target/boot-test-driver-xhci.log
          else
            echo "No serial log produced"
          fi

      - name: Upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-xhci-serial-${{ github.sha }}
          path: target/boot-test-driver-xhci.log
          retention-days: 30

      - name: Cleanup signing material
        if: always()
        run: rm -rf .keys/

  boot-smoke-summary:
    name: boot-smoke summary
    runs-on: ubuntu-latest
    needs:
      - ramfs-round-trip
      - keyring-round-trip
      - ps2-input-round-trip
      - xhci-round-trip
    if: always()
    steps:
      - name: Aggregate
        run: |
          ok=true
          for r in \
            "${{ needs.ramfs-round-trip.result }}" \
            "${{ needs.keyring-round-trip.result }}" \
            "${{ needs.ps2-input-round-trip.result }}" \
            "${{ needs.xhci-round-trip.result }}"; do
            echo "  - ${r}"
            [ "${r}" = "success" ] || ok=false
          done
          ${ok} || { echo "::error::boot-smoke gate failed"; exit 1; }
          echo "boot-smoke: PASS"
