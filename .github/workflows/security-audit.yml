# Security audit suite for the microkernel baseline.
#
# Runs on every push and PR plus a weekly cadence. The blocking jobs
# enforce the supply-chain, lint, and image-hygiene contracts; the
# advisory ones produce signal without gating merge. Drop a job into
# the blocking set only when its pass rate on green code is reliable.
#
# Blocking:
#   - dependency-advisories  RustSec advisory db; deny yanked.
#   - dependency-policy      cargo-deny licenses + bans + sources.
#   - clippy-security        clippy with security lints denied.
#   - image-hygiene          symbol/strings scan over the built image
#                            (no leaked keys, no SECURITY-TODO markers,
#                            keyring syscall absence, etc.)
#   - manifest-presence      .nonos.manifest and .nonos.sig sections
#                            present in the built ELF.
#

name: security-audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1'  # Mondays 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  TOOLCHAIN: nightly-2026-01-16

jobs:
  dependency-advisories:
    name: cargo-audit (RustSec advisory db)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-v1

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install --locked cargo-audit
          fi

      - name: cargo audit
        run: |
          mkdir -p target/security
          # Drop --deny warnings: vulnerabilities still fail the job (default
          # cargo-audit behaviour); unmaintained / unsound advisories print but
          # do not block. The four ignored entries are documented in deny.toml.
          # The full report is uploaded below so warnings stay visible.
          cargo audit | tee target/security/audit.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-audit-${{ github.sha }}
          path: target/security/audit.txt
          retention-days: 30

  dependency-policy:
    name: cargo-deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-v1

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install --locked cargo-deny
          fi

      - name: cargo deny check
        run: cargo deny --all-features check licenses bans sources advisories

  clippy-security:
    name: clippy with security lints denied
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nightly toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add clippy rust-src llvm-tools-preview
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: clippy (microkernel-core)
        env:
          NONOS_SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
          RUSTUP_TOOLCHAIN: nightly-2026-01-16
        run: |
          cargo clippy --release \
            --target x86_64-nonos.json \
            --no-default-features --features microkernel-core \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -D clippy::integer_division \
            -D clippy::cast_ptr_alignment \
            -D clippy::transmute_ptr_to_ref \
            -D clippy::transmute_ptr_to_ptr \
            -D clippy::wildcard_dependencies \
            -W clippy::perf

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  image-hygiene:
    name: Image hygiene (symbol + strings scans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip binutils
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Scratch trust-chain bootstrap
        env:
          CAPSULE_SLUGS: "proof-io ramfs keyring"
        run: bash nonos-ci/scratch-trust-bootstrap.sh

      - name: Build microkernel-capsules
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: |
          make nonos-mk-libc nonos-mk-proof-io nonos-mk-ramfs nonos-mk-keyring
          make nonos-mk-capsules

      - name: Forbidden-symbol scan (Makefile list)
        run: make nonos-mk-scan

      - name: Forbidden-symbol scan (extended)
        run: bash nonos-ci/scan-microkernel-symbols.sh

      - name: Binary-hygiene scan
        run: bash nonos-ci/scan-binary-hygiene.sh

      - name: PQClean vendored snapshot pin
        run: bash nonos-ci/check-pqclean-pin.sh

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  manifest-presence:
    name: Manifest + signature sections present
    runs-on: ubuntu-latest
    needs: image-hygiene
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip binutils
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Scratch trust-chain bootstrap
        env:
          CAPSULE_SLUGS: "proof-io ramfs keyring"
        run: bash nonos-ci/scratch-trust-bootstrap.sh

      - name: Build microkernel-capsules
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: |
          make nonos-mk-libc nonos-mk-proof-io nonos-mk-ramfs nonos-mk-keyring
          make nonos-mk-capsules

      - name: Verify manifest + signature ELF sections
        run: |
          bin=target/x86_64-nonos/release/nonos-kernel
          test -f "${bin}" || { echo "::error::kernel ELF missing"; exit 1; }
          headers=$(objdump -h "${bin}")
          for sec in .nonos.manifest .nonos.sig; do
            if ! echo "${headers}" | grep -q "${sec}"; then
              echo "::error::kernel ELF missing section ${sec}"
              echo "${headers}"
              exit 1
            fi
            echo "[ok] section present: ${sec}"
          done

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  audit-summary:
    name: Audit summary
    runs-on: ubuntu-latest
    needs:
      - dependency-advisories
      - dependency-policy
      - clippy-security
      - image-hygiene
      - manifest-presence
    if: always()
    steps:
      - name: Aggregate
        run: |
          ok=true
          for r in \
            "${{ needs.dependency-advisories.result }}" \
            "${{ needs.dependency-policy.result }}" \
            "${{ needs.clippy-security.result }}" \
            "${{ needs.image-hygiene.result }}" \
            "${{ needs.manifest-presence.result }}"; do
            echo "  - ${r}"
            [ "${r}" = "success" ] || ok=false
          done
          ${ok} || { echo "::error::security-audit gate failed"; exit 1; }
          echo "security-audit: PASS (advisory lanes report separately)"
