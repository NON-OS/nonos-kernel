name: Regenerate trust keystore

# Runs on every push to main. Wipes the committed scratch trust chain,
# generates fresh Ed25519 + ML-DSA-65 trust-anchor and per-capsule
# publisher keypairs, re-signs every embedded capsule, refreshes the
# MANIFEST.sha256 ledger, then commits and pushes the regenerated
# artifacts back to the trust keystore submodule and bumps the kernel
# pointer to match. Skips when the head commit is itself a regen so
# the workflow does not loop.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate-trust:
    name: scratch trust regeneration
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'trust: auto-regenerate')"
    env:
      TOOLCHAIN: nightly-2026-01-16
      TRUST_REGEN_PAT: ${{ secrets.TRUST_REGEN_PAT }}
    steps:
      - name: Guard on required secret
        run: |
          if [ -z "${TRUST_REGEN_PAT}" ]; then
            echo "::error::TRUST_REGEN_PAT secret is not configured; cannot push regenerated trust"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.TRUST_REGEN_PAT }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN} --profile minimal \
                --component rust-src
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install host deps (python + sha tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 coreutils

      - name: Configure bot git identity
        run: |
          git config --global user.name 'nonos-trust-bot'
          git config --global user.email 'trust-bot@nonos.systems'

      - name: Run scratch trust bootstrap
        run: bash nonos-ci/scratch-trust-bootstrap.sh

      - name: Refresh MANIFEST.sha256 ledger
        run: |
          cd nonos-data/trust
          shasum -a 256 policy/*.bin keys/*.pub capsules/*.bin \
            | sort -k 2 \
            > MANIFEST.sha256

      - name: Commit + push regenerated trust to keystore submodule
        run: |
          cd nonos-data
          if git diff --quiet HEAD; then
            echo "no trust diff to commit"
            exit 0
          fi
          git add -A
          git commit -m "trust: auto-regenerate scratch chain from ${GITHUB_SHA}"
          git push https://x-access-token:${TRUST_REGEN_PAT}@github.com/NON-OS/nonos-trust-keystore.git HEAD:main

      - name: Bump kernel pointer to regenerated keystore
        run: |
          if git diff --quiet HEAD -- nonos-data; then
            echo "no pointer bump needed"
            exit 0
          fi
          git add nonos-data
          git commit -m "trust: auto-regenerate scratch chain pointer for ${GITHUB_SHA}"
          git push https://x-access-token:${TRUST_REGEN_PAT}@github.com/NON-OS/nonos-micro-kernel.git HEAD:main
