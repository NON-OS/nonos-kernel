# Blocking gate for the microkernel-only baseline.
#
# Fails the build when any of the following regress:
#   - Cargo.toml `default = ["microkernel-core"]`.
#   - An active `nonos = [...]` profile in Cargo.toml.
#   - `nonos-legacy-tree` / `nonos-syscall-keyring` reachable from any
#     production microkernel profile.
#   - Baseline counters in nonos-ci/baselines/* exceeded.
#   - `cargo check` (default) or `cargo check --features microkernel-core`.
#   - Userland capsule build, microkernel-capsules build, or the keyring
#     smoketest profile build.
#   - The Makefile-managed legacy symbol list, or the trusted-path
#     extended scan in nonos-ci/scan-microkernel-symbols.sh.
#
# Runtime QEMU smoke is in boot-test.yml. The repro lane here is
# advisory and never blocks merge.

name: microkernel-baseline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: microkernel-baseline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  TOOLCHAIN: nightly-2026-01-16

jobs:
  static-checks:
    name: Static / feature checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (cargo metadata only)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN} --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: make nonos-mk-static
        run: make nonos-mk-static

  cargo-check-default:
    name: cargo check (default = microkernel-core)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: cargo check (default)
        env:
          NONOS_SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
          RUSTUP_TOOLCHAIN: nightly-2026-01-16
        run: |
          cargo check --release \
            --target x86_64-nonos.json \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  cargo-check-microkernel-core:
    name: cargo check --features microkernel-core
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: cargo check (--no-default-features --features microkernel-core)
        env:
          NONOS_SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
          RUSTUP_TOOLCHAIN: nightly-2026-01-16
        run: |
          cargo check --release \
            --target x86_64-nonos.json \
            --no-default-features --features microkernel-core \
            -Zbuild-std=core,alloc \
            -Zbuild-std-features=compiler-builtins-mem

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  build-and-scan:
    name: Build microkernel image and scan symbols
    runs-on: ubuntu-latest
    needs:
      - cargo-check-default
      - cargo-check-microkernel-core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip binutils
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Build userland capsules
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-libc nonos-mk-proof-io nonos-mk-ramfs nonos-mk-keyring

      - name: Build microkernel-capsules kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-capsules

      - name: Symbol scan (Makefile list, microkernel-capsules)
        run: make nonos-mk-scan

      - name: Symbol scan (extended, microkernel-capsules)
        run: bash nonos-ci/scan-microkernel-symbols.sh

      - name: Snapshot microkernel-capsules image
        run: |
          mkdir -p target/baseline-images
          cp target/x86_64-nonos/release/nonos-kernel \
             target/baseline-images/nonos-kernel.microkernel-capsules

      - name: Build microkernel-keyring-smoketest kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
        run: make nonos-mk-keyring-test

      - name: Symbol scan (Makefile list, smoketest)
        run: make nonos-mk-scan

      - name: Symbol scan (extended, smoketest)
        run: bash nonos-ci/scan-microkernel-symbols.sh

      - name: Snapshot smoketest image
        run: |
          mkdir -p target/baseline-images
          cp target/x86_64-nonos/release/nonos-kernel \
             target/baseline-images/nonos-kernel.microkernel-keyring-smoketest

      - name: Upload kernel images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: microkernel-images-${{ github.sha }}
          path: target/baseline-images/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  repro:
    name: Reproducibility (advisory)
    runs-on: ubuntu-latest
    needs: build-and-scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          source "$HOME/.cargo/env"
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip binutils
          pip3 install --user pynacl

      - name: Setup signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: bash nonos-ci/setup-signing-key.sh

      - name: Pin SOURCE_DATE_EPOCH
        id: epoch
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: First build
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          make nonos-mk-libc nonos-mk-proof-io nonos-mk-ramfs nonos-mk-keyring
          make nonos-mk-capsules
          mkdir -p target/repro
          sha256sum target/x86_64-nonos/release/nonos-kernel | tee target/repro/hash-1.txt
          cp target/x86_64-nonos/release/nonos-kernel target/repro/build-1.bin

      - name: Drop kernel target
        run: make nonos-mk-clean

      - name: Second build
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: |
          make nonos-mk-capsules
          sha256sum target/x86_64-nonos/release/nonos-kernel | tee target/repro/hash-2.txt
          cp target/x86_64-nonos/release/nonos-kernel target/repro/build-2.bin

      - name: Compare
        run: |
          h1=$(awk '{print $1}' target/repro/hash-1.txt)
          h2=$(awk '{print $1}' target/repro/hash-2.txt)
          echo "build-1: ${h1}"
          echo "build-2: ${h2}"
          if [ "${h1}" = "${h2}" ]; then
            echo "::notice::repro: byte-identical microkernel image"
          else
            echo "::warning::repro: drift detected (advisory)"
          fi

      - name: Section-header diff
        if: always()
        run: |
          objdump -h target/repro/build-1.bin > target/repro/objdump-1.txt 2>&1 || true
          objdump -h target/repro/build-2.bin > target/repro/objdump-2.txt 2>&1 || true
          diff -u target/repro/objdump-1.txt target/repro/objdump-2.txt \
            > target/repro/objdump-diff.txt || true

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-${{ github.sha }}
          path: target/repro/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  baseline-summary:
    name: Baseline summary
    runs-on: ubuntu-latest
    needs:
      - static-checks
      - cargo-check-default
      - cargo-check-microkernel-core
      - build-and-scan
    if: always()
    steps:
      - name: Aggregate
        run: |
          ok=true
          for r in \
            "${{ needs.static-checks.result }}" \
            "${{ needs.cargo-check-default.result }}" \
            "${{ needs.cargo-check-microkernel-core.result }}" \
            "${{ needs.build-and-scan.result }}"; do
            echo "  - ${r}"
            [ "${r}" = "success" ] || ok=false
          done
          ${ok} || { echo "::error::microkernel-baseline gate failed"; exit 1; }
          echo "microkernel-baseline: PASS (repro lane is advisory)"
