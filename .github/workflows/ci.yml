name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src clippy rustfmt llvm-tools-preview
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Check kernel
        run: cargo check --target x86_64-nonos.json -Zbuild-std=core,alloc

      - name: Clippy
        run: cargo clippy --target x86_64-nonos.json -Zbuild-std=core,alloc -- -D warnings
        continue-on-error: true

      - name: Check formatting
        run: cargo fmt --check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build kernel (release)
        run: cargo build --release --target x86_64-nonos.json -Zbuild-std=core,alloc

      - name: Extract binary
        run: |
          rust-objcopy -O binary \
            target/x86_64-nonos/release/nonos-kernel \
            target/kernel.bin

      - name: Verify artifact
        run: |
          test -f target/kernel.bin || { echo "Kernel binary not created"; exit 1; }
          ls -lh target/kernel.bin
          echo "Build successful"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.sha }}
          path: target/kernel.bin
          retention-days: 30
