name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup signing key
        run: |
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          chmod 600 .keys/dev-signing.seed
          test -s .keys/dev-signing.seed || { echo "Signing key empty"; exit 1; }

      - name: Build
        run: make all
        env:
          NONOS_SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonos-kernel-${{ github.sha }}
          path: target/x86_64-nonos/release/nonos_kernel
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -rf .keys/
