name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools
          pip3 install pynacl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup signing key
        run: |
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          chmod 600 .keys/dev-signing.seed
          test -s .keys/dev-signing.seed || { echo "Signing key empty or invalid"; exit 1; }
          [ $(wc -c < .keys/dev-signing.seed) -eq 32 ] || { echo "Signing key must be 32 bytes"; exit 1; }

      - name: Build bootloader
        run: make bootloader
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Build kernel
        run: make kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Sign kernel
        run: make sign-kernel
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: nonos-kernel-${{ github.sha }}
          path: target/x86_64-nonos/release/nonos-kernel
          retention-days: 30

      - name: Upload signed kernel
        uses: actions/upload-artifact@v4
        with:
          name: nonos-kernel-signed-${{ github.sha }}
          path: target/kernel_signed.bin
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -rf .keys/

  release:
    name: Release Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2026-01-16
          source ~/.cargo/env
          rustup component add rust-src llvm-tools-preview
          rustup target add x86_64-unknown-uefi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xorriso gdisk mtools
          pip3 install pynacl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup keys
        run: |
          mkdir -p .keys
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > .keys/dev-signing.seed
          chmod 600 .keys/dev-signing.seed
          if [ -n "${{ secrets.ZK_PROVING_KEY_BASE64 }}" ]; then
            mkdir -p nonos-bootloader/tools/nonos-attestation-circuit/generated_keys
            echo "${{ secrets.ZK_PROVING_KEY_BASE64 }}" | base64 -d > nonos-bootloader/tools/nonos-attestation-circuit/generated_keys/attestation_proving_key.bin
          fi

      - name: Build release
        run: |
          if [ -f nonos-bootloader/tools/nonos-attestation-circuit/generated_keys/attestation_proving_key.bin ]; then
            make ci-release
          else
            make bootloader kernel sign-kernel iso usb checksums
          fi
        env:
          SIGNING_KEY: ${{ github.workspace }}/.keys/dev-signing.seed

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nonos-release-${{ github.sha }}
          path: |
            target/release/*.iso
            target/release/*.img
            target/release/*.bin
            target/release/SHA256SUMS
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf .keys/
