# Trust-chain CI for the verified-spawn capsule set.
#
# Two distinct proof lanes — do not conflate them in a release
# claim:
#
#   scratch ceremony
#       Generates fresh trust-anchor + per-capsule publisher keys
#       inside the CI workspace, re-seals the policy, signs every
#       verified capsule, and verifies the artifacts. Proves the
#       host signer mechanics, the macro, and every Capsule.mk are
#       consistent. Says NOTHING about the policy baked into the
#       kernel image.
#
#   baked artifact proof
#       Runs `make nonos-mk-host-trust-test` against whatever
#       `.keys/nonos_trust_anchor.policy.bin` and per-capsule
#       artifacts are present in the workspace. Proves that the
#       host signer and the kernel verifier agree on the actual
#       baked policy. Fails loudly when those artifacts are
#       absent — production key custody is still a separate slice
#       (HSM / offline ceremony / key-rotation) and CI does not
#       claim it.

name: nonos-trust-chain

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nonos-trust-chain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  TOOLCHAIN: nightly-2026-01-16

jobs:

  static-gates:
    name: Static gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain (cargo metadata only)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN} --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: bash nonos-ci/run-static-checks.sh
        run: bash nonos-ci/run-static-checks.sh

  host-trust:
    name: Host trust chain (baked artifact proof)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nonos-sign/target
          key: ${{ runner.os }}-trust-chain-host-${{ hashFiles('nonos-sign/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-trust-chain-host-

      - name: Check baked artifact presence
        id: baked
        run: |
          policy=nonos-data/trust/policy/nonos_trust_anchor.policy.bin
          missing=()
          [ -f "${policy}" ] || missing+=("${policy}")
          for bin in proof_io ramfs \
                     driver_virtio_rng driver_ps2_input \
                     driver_virtio_blk driver_virtio_net \
                     driver_xhci ; do
            cert="nonos-data/trust/capsules/${bin}.nonos_id_cert.bin"
            mf="nonos-data/trust/capsules/${bin}.manifest.bin"
            [ -f "${cert}" ] || missing+=("${cert}")
            [ -f "${mf}" ]   || missing+=("${mf}")
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "skip=0" >> "$GITHUB_OUTPUT"
            echo "Baked artifact set complete."
          elif [ "${NONOS_CI_ALLOW_NO_BAKED_ARTIFACTS:-0}" = "1" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::warning::Baked artifacts absent; skipping per NONOS_CI_ALLOW_NO_BAKED_ARTIFACTS=1."
            printf '  missing: %s\n' "${missing[@]}"
          else
            echo "::error::Baked trust-anchor / capsule artifacts absent in CI workspace."
            echo "::error::Set NONOS_CI_ALLOW_NO_BAKED_ARTIFACTS=1 only when the baked set genuinely lives outside CI."
            printf '  missing: %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Build nonos-sign host tool
        if: steps.baked.outputs.skip != '1'
        run: |
          cd nonos-sign
          cargo build --release --bin capsule-sign

      - name: make nonos-mk-host-trust-test
        if: steps.baked.outputs.skip != '1'
        run: make nonos-mk-host-trust-test

      - name: Capture baked artifact digests
        if: steps.baked.outputs.skip != '1' && always()
        run: |
          mkdir -p ci-out
          for f in nonos-data/trust/policy/*.bin \
                   nonos-data/trust/keys/*.pub \
                   nonos-data/trust/capsules/*.bin ; do
            [ -f "$f" ] || continue
            sha256sum "$f" | tee -a ci-out/baked-artifact-sha256.txt
          done

      - name: Upload baked-lane logs and digests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-trust-baked
          path: |
            ci-out/baked-artifact-sha256.txt
          if-no-files-found: ignore

  scratch-sign-matrix:
    name: Scratch ceremony — sign all 7 verified capsules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          rustup component add rust-src
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nonos-sign/target
            userland/libc/target
          key: ${{ runner.os }}-trust-chain-scratch-${{ hashFiles('Cargo.lock', 'nonos-sign/Cargo.lock', 'userland/libc/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-trust-chain-scratch-

      - name: Build nonos-sign host tool
        run: |
          cd nonos-sign
          cargo build --release --bin capsule-sign

      - name: Generate scratch trust-anchor keys
        run: |
          mkdir -p .keys nonos-data/trust/keys
          # `keygen --out <prefix>` writes <prefix>.seed and <prefix>.pub
          # to the same directory. Generate into .keys/ then move
          # the .pub half into the committed location so signing
          # commands find seeds in .keys/ and pubs in nonos-data/trust/keys/.
          nonos-sign/target/release/capsule-sign keygen --alg ed25519 \
            --out .keys/nonos_trust_anchor_ed25519
          nonos-sign/target/release/capsule-sign keygen --alg mldsa65 \
            --out .keys/nonos_trust_anchor_mldsa65
          chmod 600 .keys/nonos_trust_anchor_*.seed
          mv .keys/nonos_trust_anchor_*.pub nonos-data/trust/keys/

      - name: Generate scratch publisher keys for the 13 verified capsules
        run: |
          for prefix in proof_io ramfs keyring entropy crypto vfs market \
                        driver_virtio_rng driver_ps2_input \
                        driver_virtio_blk driver_virtio_net \
                        driver_xhci driver_e1000 ; do
            nonos-sign/target/release/capsule-sign keygen --alg ed25519 \
              --out .keys/${prefix}_publisher_ed25519
            nonos-sign/target/release/capsule-sign keygen --alg mldsa65 \
              --out .keys/${prefix}_publisher_mldsa65
            chmod 600 .keys/${prefix}_publisher_*.seed
            mv .keys/${prefix}_publisher_*.pub nonos-data/trust/keys/
          done

      - name: Build userland libc and all 13 capsule ELFs
        run: |
          make nonos-mk-libc
          # market depends on the marketplace_abi rlib
          make nonos-mk-marketplace-abi
          for slug in proof-io ramfs keyring entropy crypto vfs market \
                      driver-virtio-rng driver-virtio-gpu driver-ps2-input \
                      driver-virtio-blk driver-virtio-net \
                      driver-xhci driver-e1000 ; do
            make nonos-mk-${slug}
          done

      - name: Wipe any pre-existing cert/manifest artifacts
        run: |
          rm -f nonos-data/trust/capsules/*.nonos_id_cert.bin
          rm -f nonos-data/trust/capsules/*.manifest.bin
          rm -f nonos-data/trust/policy/*.bin

      - name: Seal scratch trust-anchor policy
        run: make nonos-mk-trust-policy

      - name: Sign cert + manifest for all 13 verified capsules
        run: |
          for slug in proof-io ramfs keyring entropy crypto vfs market \
                      driver-virtio-rng driver-virtio-gpu driver-ps2-input \
                      driver-virtio-blk driver-virtio-net \
                      driver-xhci driver-e1000 ; do
            make nonos-mk-${slug}-sign
          done

      - name: Verify scratch artifacts via nonos-sign
        run: |
          cd nonos-sign
          cargo test --release --test artifacts

      - name: Collect cert ids, payload hashes, and SHA-256 digests
        if: always()
        run: |
          mkdir -p ci-out
          {
            echo "# Scratch ceremony — public artifacts, $(date -u +%FT%TZ)"
            echo
            echo "## Trust-anchor policy"
            sha256sum nonos-data/trust/policy/*.bin || true
            echo
            echo "## Per-capsule certs and manifests"
            for f in nonos-data/trust/capsules/*.nonos_id_cert.bin \
                     nonos-data/trust/capsules/*.manifest.bin ; do
              [ -f "$f" ] || continue
              sha256sum "$f"
            done
          } > ci-out/scratch-artifact-sha256.txt

          {
            echo "# Scratch ceremony — public key fingerprints"
            for f in nonos-data/trust/keys/*.pub ; do
              [ -f "$f" ] || continue
              sha256sum "$f"
            done
          } > ci-out/scratch-pubkey-sha256.txt

      - name: Refuse to upload seed files
        if: always()
        run: |
          if compgen -G ".keys/*.seed" > /dev/null ; then
            chmod 600 .keys/*.seed
          fi
          # Hard guard — the upload step's path list explicitly
          # excludes seeds, but assert on the runner side too.
          for f in .keys/*.seed ; do
            [ -f "$f" ] || continue
            if [ "$(stat -c '%a' "$f")" != "600" ]; then
              echo "::error::seed file $f does not have mode 600"
              exit 1
            fi
          done

      - name: Upload scratch ceremony — public keys, certs, manifests, digests, logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scratch-ceremony
          path: |
            nonos-data/trust/keys/*.pub
            nonos-data/trust/policy/*.bin
            nonos-data/trust/capsules/*.bin
            ci-out/scratch-artifact-sha256.txt
            ci-out/scratch-pubkey-sha256.txt
          if-no-files-found: error

  kernel-cargo-matrix:
    name: Kernel cargo check (${{ matrix.feature }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - nonos-capsule-proof-io
          - nonos-capsule-ramfs
          - nonos-capsule-keyring
          - nonos-capsule-entropy
          - nonos-capsule-crypto
          - nonos-capsule-vfs
          - nonos-capsule-market
          - nonos-capsule-driver-virtio-rng
          - nonos-capsule-driver-ps2-input
          - nonos-capsule-driver-virtio-blk
          - nonos-capsule-driver-virtio-net
          - nonos-capsule-driver-xhci
          - nonos-capsule-driver-e1000
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          rustup component add rust-src
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-trust-chain-kernel-${{ matrix.feature }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-trust-chain-kernel-${{ matrix.feature }}-

      # Each verified capsule's `embed.rs` `include_bytes!`s the
      # userland ELF at `userland/capsule_<slug>/target/x86_64-nonos-user/
      # release/<bin>`. Build it (and its libc/marketplace_abi deps)
      # before cargo check so the include resolves. The `nonos-mk-<slug>`
      # target only builds the `_BIN` — it does not touch cert/manifest,
      # so it does not require the trust-anchor seed.
      - name: Build userland binary for ${{ matrix.feature }}
        run: |
          set -euo pipefail
          slug="${{ matrix.feature }}"
          slug="${slug#nonos-capsule-}"
          make nonos-mk-libc
          if [ "${slug}" = "market" ]; then
              make nonos-mk-marketplace-abi
          fi
          make "nonos-mk-${slug}"

      - name: cargo check microkernel-core,${{ matrix.feature }}
        run: |
          cargo check --target x86_64-nonos.json \
            -Zbuild-std=core,alloc,compiler_builtins \
            -Zbuild-std-features=compiler-builtins-mem \
            --no-default-features \
            --features "microkernel-core,${{ matrix.feature }}"

      - name: cargo check microkernel-core,nonos-production,${{ matrix.feature }}
        run: |
          cargo check --target x86_64-nonos.json \
            -Zbuild-std=core,alloc,compiler_builtins \
            -Zbuild-std-features=compiler-builtins-mem \
            --no-default-features \
            --features "microkernel-core,nonos-production,${{ matrix.feature }}"

  kernel-cargo-production-all:
    name: Kernel cargo check (all 13 verified under nonos-production)
    runs-on: ubuntu-latest
    needs: kernel-cargo-matrix
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          rustup component add rust-src
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-trust-chain-kernel-prod-all-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-trust-chain-kernel-prod-all-

      # All 13 verified capsules' `embed.rs` `include_bytes!`s their
      # userland ELF. Build all of them before cargo check.
      - name: Build userland binaries for every verified capsule
        run: |
          set -euo pipefail
          make nonos-mk-libc
          make nonos-mk-marketplace-abi
          for slug in proof-io ramfs keyring entropy crypto vfs market \
                      driver-virtio-rng driver-virtio-gpu driver-ps2-input \
                      driver-virtio-blk driver-virtio-net \
                      driver-xhci driver-e1000 ; do
              make "nonos-mk-${slug}"
          done

      - name: cargo check microkernel-core,nonos-production + all 13 verified capsules
        run: |
          cargo check --target x86_64-nonos.json \
            -Zbuild-std=core,alloc,compiler_builtins \
            -Zbuild-std-features=compiler-builtins-mem \
            --no-default-features \
            --features "microkernel-core,nonos-production,nonos-capsule-proof-io,nonos-capsule-ramfs,nonos-capsule-keyring,nonos-capsule-entropy,nonos-capsule-crypto,nonos-capsule-vfs,nonos-capsule-market,nonos-capsule-driver-virtio-rng,nonos-capsule-driver-ps2-input,nonos-capsule-driver-virtio-blk,nonos-capsule-driver-virtio-net,nonos-capsule-driver-xhci,nonos-capsule-driver-e1000"

  userland-cargo-check:
    name: Userland cargo check (${{ matrix.capsule.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        capsule:
          - { dir: capsule_proof_io,           build_std: core,        build_features: '' }
          - { dir: capsule_ramfs,              build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_keyring,            build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_entropy,            build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_crypto,             build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_vfs,                build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_market,             build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_driver_virtio_rng,  build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_driver_ps2_input,   build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_driver_virtio_blk,  build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_driver_virtio_net,  build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
          - { dir: capsule_driver_xhci,        build_std: 'core,alloc', build_features: 'compiler-builtins-mem' }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain ${TOOLCHAIN}
          rustup component add rust-src
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            userland/${{ matrix.capsule.dir }}/target
            userland/libc/target
          key: ${{ runner.os }}-trust-chain-userland-${{ matrix.capsule.dir }}-${{ hashFiles('userland/libc/Cargo.toml', format('userland/{0}/Cargo.toml', matrix.capsule.dir)) }}
          restore-keys: ${{ runner.os }}-trust-chain-userland-${{ matrix.capsule.dir }}-

      - name: Build userland libc (dependency)
        run: make nonos-mk-libc

      - name: cargo check userland/${{ matrix.capsule.dir }}
        working-directory: userland/${{ matrix.capsule.dir }}
        run: |
          if [ -n "${{ matrix.capsule.build_features }}" ]; then
            cargo check --release \
              --target ../x86_64-nonos-user.json \
              -Zbuild-std=${{ matrix.capsule.build_std }} \
              -Zbuild-std-features=${{ matrix.capsule.build_features }}
          else
            cargo check --release \
              --target ../x86_64-nonos-user.json \
              -Zbuild-std=${{ matrix.capsule.build_std }}
          fi
